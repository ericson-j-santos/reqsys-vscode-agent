app = "reqsys-vscode-agent"
primary_region = "gru"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "runtime/Dockerfile.agent"

[env]
  REQSYS_RUNTIME_ENVIRONMENT = "dev"
  FLY_APP_NAME = "reqsys-vscode-agent"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
